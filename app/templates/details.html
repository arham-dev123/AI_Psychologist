{% extends 'base_dashboard.html' %}

{% block head %}
    <title>AI Psychologist</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/details.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
{% endblock %}

{% block content %}
    <main class="details-page">
        <section class="details-card">
            <div class="details-header">
                <span class="material-symbols-outlined">clinical_notes</span>
                <div>
                    <p class="eyebrow">Patient Information</p>
                    <h1>Enter Details</h1>
                    <p class="subtitle">Fill patient details to generate the final assessment report.</p>
                </div>
            </div>

            <form action="{{ url_for('form.details', total_score=total_score, form_type=form_type) }}" method="POST" class="details-form">
                <input type="hidden" name="formType" value="{{ form_type }}">

                <div class="form-grid">
                    <label class="field">
                        <span>First Name</span>
                        <input type="text" name="first_name" placeholder="Enter first name" required>
                    </label>

                    <label class="field">
                        <span>Last Name</span>
                        <input type="text" name="last_name" placeholder="Enter last name" required>
                    </label>

                    <label class="field">
                        <span>Age</span>
                        <input type="number" name="age" placeholder="Enter age" min="1" max="120" required>
                    </label>

                    <label class="field">
                        <span>Contact Number</span>
                        <input type="tel" name="contact_number" placeholder="Enter contact number" pattern="[0-9+\-\s()]{7,20}" required>
                    </label>

                    <label class="field">
                        <span>Gender</span>
                        <select name="gender" required>
                            <option value="" selected disabled>Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Date Of Birth</span>
                        <input type="date" name="date_of_birth" required>
                    </label>

                    <label class="field">
                        <span>Issue Date</span>
                        <input type="date" name="issue_date" required>
                    </label>

                    <label class="field">
                        <span>Height</span>
                        <input type="text" name="height" placeholder="e.g. 5 ft 8 in" required>
                    </label>

                    <label class="field">
                        <span>Weight</span>
                        <input type="text" name="weight" placeholder="e.g. 70 kg" required>
                    </label>

                    <label class="field">
                        <span>Blood Group</span>
                        <select name="blood_group" required>
                            <option value="" selected disabled>Select blood group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Nationality</span>
                        <input type="text" name="nationality" placeholder="Enter nationality" required>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-action">
                        <span class="material-symbols-outlined">description</span>
                        Generate Report
                    </button>
                </div>
            </form>
        </section>
    </main>
{% endblock %}
