{% extends 'base_dashboard.html' %}

{% block head %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Report Assessment</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
{% endblock %}

{% block content %}
<div class="assessment-page">
    <div class="assessment-shell">
        <div class="assessment-panel box box-success direct-chat direct-chat-success">
            <div class="box-header with-border assessment-header">
                <div class="assessment-title">
                    <span class="material-symbols-outlined">assignment</span>
                    <div>
                        <p>Clinical Screening</p>
                        <h3 class="box-title">Self-Report Assessment</h3>
                    </div>
                </div>
                <span class="assessment-status" id="questionProgress">Question 1</span>
            </div>
            <div class="box-body assessment-body">
                <form id="assessment-form"></form>
            </div>
            <div class="box-footer assessment-footer">
                <button class="right btn btn-lg assessment-button secondary" id="prevBtn" style="display: none;">Previous</button>
                <button class="right btn btn-lg assessment-button" id="nextBtn">Next</button>
                <button class="right btn btn-lg assessment-button" id="finishBtn" style="display: none;">Finish</button>
            </div>
        </div>
    </div>
</div>

<script>
    let forms = null;
    const formType = '{{ formType }}';
    let selectedOptions = {};

    async function fetchFormsData() {
        try {
            const response = await fetch(`/form/api/${formType}`);
            const data = await response.json();
            forms = data[formType];
            renderQuestion(0);
        } catch (error) {
            console.error('Error fetching forms data:', error);
        }
    }

    fetchFormsData();

    const assessmentForm = document.getElementById('assessment-form');
    const questionProgress = document.getElementById('questionProgress');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const finishBtn = document.getElementById('finishBtn');
    let currentQuestion = 0;

    prevBtn.addEventListener('click', showPrevQuestion);
    nextBtn.addEventListener('click', showNextQuestion);
    finishBtn.addEventListener('click', submitForm);

    function renderQuestion(index) {
        const questionData = forms['questions'][index];
        questionProgress.textContent = `Question ${index + 1} of ${forms['questions'].length}`;
        const optionsHTML = questionData.options.map((option, i) => `
            <label class="option">
                <input type="radio" name="question-${index}" value="${option.value}" ${selectedOptions[index] === option.value ? 'checked' : ''}>
                <span>${option.text}</span>
            </label>
        `).join('');

        const questionHTML = `
            <div class="question" id="question-${index}">
                <p>${index + 1}. ${questionData.text}</p>
                <div class="options">${optionsHTML}</div>
            </div>
        `;

        assessmentForm.innerHTML = questionHTML;
    }

    function showPrevQuestion() {
        const currentOptions = document.querySelectorAll(`input[name="question-${currentQuestion}"]:checked`);
        const selectedOption = currentOptions.length > 0 ? currentOptions[0].value : null;

        if (selectedOption) {
            selectedOptions[currentQuestion] = selectedOption;
        }

        currentQuestion--;
        renderQuestion(currentQuestion);
        updateNavButtons();
    }

    function showNextQuestion() {
        const currentOptions = document.querySelectorAll(`input[name="question-${currentQuestion}"]:checked`);
        const selectedOption = currentOptions.length > 0 ? currentOptions[0].value : null;

        if (!selectedOption) {
            alert('Please select an option before proceeding.');
            return;
        }

        selectedOptions[currentQuestion] = selectedOption;
        currentQuestion++;
        if (currentQuestion === forms['questions'].length) {
            finishBtn.style.display = 'inline-block';
            nextBtn.style.display = 'none';
        } else {
            renderQuestion(currentQuestion);
        }
        updateNavButtons();
    }

    function updateNavButtons() {
        prevBtn.style.display = currentQuestion === 0 ? 'none' : 'inline-block';
        nextBtn.style.display = currentQuestion === forms['questions'].length - 1 ? 'none' : 'inline-block';
        finishBtn.style.display = currentQuestion === forms['questions'].length - 1 ? 'inline-block' : 'none';
    }

    function submitForm() {
        const formData = {
            formType: formType,
            answers: Object.values(selectedOptions)
        };

        fetch('/form/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            window.location.href = `/form/details/${data.totalScore}/${data.formType}`;
        })
        .catch(error => {
            console.error('Error submitting form:', error);
        });
    }
</script>
{% endblock %}
