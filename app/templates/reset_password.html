{% extends 'base.html' %}

{% block head %}
<title>Reset Password | AI Psychologist</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<main class="auth-recovery-page">
    <section class="auth-recovery-card">
        <div class="auth-recovery-header">
            <span class="material-symbols-outlined">shield_lock</span>
            <div>
                <p class="auth-eyebrow">Password Recovery</p>
                <h1>Set New Password</h1>
                <p>Create a new password for your AI Psychologist account.</p>
            </div>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('auth.reset_password') }}" method="POST" class="auth-recovery-form" oninput='confirm_password.setCustomValidity(new_password.value != confirm_password.value ? "Passwords do not match." : "")'>
            <label class="auth-field">
                <span>New Password</span>
                <input type="password" name="new_password" placeholder="Enter new password" minlength="8" required>
            </label>

            <label class="auth-field">
                <span>Confirm New Password</span>
                <input type="password" name="confirm_password" placeholder="Confirm new password" minlength="8" required>
            </label>

            <button type="submit" class="auth-primary-action">
                <span class="material-symbols-outlined">check_circle</span>
                Reset Password
            </button>
        </form>
    </section>
</main>
{% endblock %}
