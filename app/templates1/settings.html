{% extends 'base_dashboard.html' %}

{% block head %}

<title> Settings | AI Psychologist </title>
<meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">

{% endblock %}

{% block content %}
        <div class="container my-3 py-3">
            {% if response == 'failed' %}
            <div class="alert alert-danger text-center" role="alert">
                Profile could not updated!
            </div>
            {% elif response == 'succeeded' %}
            <div class="alert alert-success text-center" role="alert">
                Profile updated!
            </div>
            {% endif %}
            <div class="row">
                <div class="col-md-8 offset-md-3 col-sm-12">
                    <div class="box box-success direct-chat direct-chat-success text-center">
                        <form action="/settings" method="POST"
                            oninput='new_password2.setCustomValidity(new_password1.value != new_password2.value ? "Passwords do not match." : "")'>
                            <div class="box-body d-flex">
                                <input type="name" placeholder="Enter Name" name="name" class="form-control" id="name" value="{{ session['name']}}" style="font-size: x-large; background-color: #E1EEFF; width: 100%; border: none !important;" required>
                            </div>
                            <div class="box-body d-flex">
                                <input type="email" name="email" class="form-control" id="email" value="{{ session['email'] }}"
                                style="font-size: x-large; background-color: #E1EEFF; width: 100%; border: none !important;" readonly>
                            </div>
                            
                            <div class="box-body d-flex">
                                <input type="password" placeholder="Enter Current Password" name="current_password" class="form-control" id="current_password" value="{{ session['current_password']}}" style="font-size: x-large; background-color: #E1EEFF; width: 100%; border: none !important;" required>
                            </div>
                            <div class="box-body d-flex">
                                <input type="password" placeholder="Enter New Password" name="new_password1" class="form-control" id="new_password1" style="font-size: x-large; background-color: #E1EEFF; width: 100%; border: none !important;" required>
                            </div>
                            <div class="box-body d-flex">
                                <input type="password"  placeholder="Confirm New Password" name="new_password2" class="form-control" id="new_password2" style="font-size: x-large; background-color: #E1EEFF; width: 100%; border: none !important;" required>
                            </div>
                            <div class="box-footer">
                                <button type="submit" class="btn btn-lg px-4 me-md-2" style="background-color: #0360D9; color: #FFFFFF;">Update</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>


{% endblock %}
