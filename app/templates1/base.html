<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
  

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/aibot.png') }}" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

  

  <style>
    .selected {
      color: #0360D9 !important;
      text-decoration-line: underline !important;
      text-underline-offset: 0.4rem !important;
      text-decoration-color: #0360D9 !important;

    }

  </style>
  {% block head %}

  {% endblock %}
</head>

<body style="background-color: #E1EEFF;">

  <!-- Spinner -->

  <div id="loading">
    <div class="spinner-border text-info" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>



  <!-- Navigation Bar-->

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand p-0 me-2" href="./" aria-label="AI Psychologist">
        <h2>
          <span class=" fw-bold lh-1 mb-3" style="color: #021526;">AI</span> <span class=" fw-bold lh-1 mb-3" style="color: #0360D9;">PSYCHOLOGIST</span>
        </h2>
      </a>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <div class="mx-auto text-center">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex justify-content-center">
            <li class="nav-item mb-3">
              <a class="nav-link active {% if request.path == url_for('main.home') %}selected{% endif %}" aria-current="page" href="{{ url_for('main.home') }}" style="color:#0D2B46;">Home</a>
            </li>
            <li class="nav-item mb-3">
              <a class="nav-link active {% if request.path == url_for('main.services') %}selected{% endif %}" href="{{ url_for('main.services') }}" style="color:#0D2B46;">Services</a>
            </li>
            <li class="nav-item dropdown mb-3">
              <a class="nav-link dropdown-toggle active" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown"
                aria-expanded="false" style="color:#0D2B46;">
                Products
              </a>
              <ul class="dropdown-menu" aria-labelledby="navbarDropdown" style="background-color: #E1EEFF;">
                <li><a class="dropdown-item" {% if request.path == url_for('chat.chat') %}selected{% endif %} href="{{ url_for('chat.chat') }}" style="color: #0D2B46;">AI Psychologist</a></li>
              </ul>
            </li>
            <li class="nav-item mb-3">
              <a class="nav-link active {% if request.path == url_for('main.contact_us') %}selected{% endif %}" href="{{ url_for('main.contact_us') }}" style="color:#0D2B46;">Contact us</a>
            </li>
          </ul>
        </div>
        
        <!-- <form class="d-flex">
                  <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                  <button class="btn btn-outline-light" type="submit">Search</button>
              </form> -->
        {% if "email" not in session %}
        <button type="button" class="btn btn-outline-primary mx-2" data-bs-toggle="modal"
          data-bs-target="#loginModal" style="border-radius:20px;">Log in</button>
        <button type="button" class="btn btn-primary mx-1" data-bs-toggle="modal" data-bs-target="#signupModal" style="border-radius:20px;">Sign
          up</button>
        {% else %}
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-warning" role="button" style="border-radius:20px;">Dashboard</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Modal Login -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="loginModalLabel">Login</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">

          <!-- Modal body -->
          <form action="{{ url_for('auth.login') }}" method="POST" style="border-radius:18px" >
            <div class="row mb-3">
              <div class="col-sm-6">
                <input type="email" class="form-control" id="email" placeholder="Enter your Email" aria-describedby="emailHelp" name="email" style="border-radius:20px;" required>
              </div>
              <div class="col-sm-6">
                <input type="password" class="form-control" placeholder="Enter your Password" id="password" name="password" style="border-radius:20px;" required>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-sm-6">
                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="remember" name="remember">
                  <label class="form-check-label" for="remember">Remember me</label>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                  <div class="d-grid gap-2 col-6 mx-auto">
                      <button type="submit" class="btn btn-primary btn-block" style="border-radius:20px;">Log in</button>
                  </div>
              </div>
            </div>
            <!-- Add a gap -->
            <div class="row">
                <div class="col-12 mt-3">
                    <!-- The 'mt-3' class adds margin-top for the gap -->
                    <div class="d-grid gap-2 col-6 mx-auto">
                        <!-- Change button color to black -->
                        <button class="btn btn-dark btn-block" type="button" style="border-radius:20px;" onclick="toggleModals2()">Sign up</button>
                    </div>
                </div>
            </div>
          </form>

        </div>
        <!-- <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:20px;">Close</button>
        </div> -->
      </div>
    </div>
  </div>

  <!-- Modal Signup -->
  <div class="modal fade" id="signupModal" tabindex="-1" aria-labelledby="signupModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="signupModalLabel">Sign up</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="border-radius:20px;"></button>
        </div>
        <div class="modal-body">
          <!-- Signup Modal Body -->

          <form action="{{url_for('auth.signup')}}" method="POST" oninput='password2.setCustomValidity(password.value != password2.value ? "Passwords do not match." : "")'>
            <div class="row mb-3">
              <div class="col-sm-6">
                <input type="text" class="form-control" id="inputName" placeholder="Enter your Name" name="name" style="border-radius:20px;" required>
              </div>
              <div class="col-sm-6">
                <input type="email" class="form-control" id="inputEmail" placeholder="Enter your Email" name="email" style="border-radius:20px"; required>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-sm-6">
                <input type="password" class="form-control" id="inputPassword" placeholder="Enter your Password" name="password" style="border-radius:20px" required>
              </div>
              <div class="col-sm-6">
                <input type="password" class="form-control" id="inputPassword2" placeholder="Re-enter your Password" name="password2" style="border-radius:20px" required>
              </div>
            </div>
            <!-- <fieldset class="row mb-3">
              <legend class="col-form-label col-sm-2 pt-0">I am a</legend>
              <div class="col-sm-10">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="userType" id="userType1" value="patient" checked>
                  <label class="form-check-label" for="userType1">
                    Patient
                  </label>
                </div>
                <div class="form-check disabled">
                  <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios3" value="option3"
                    disabled>
                  <label class="form-check-label" for="gridRadios3">
                    Third disabled radio
                  </label>
                </div>
              </div> 
            </fieldset> -->
            <div class="row mb-3">
              <div class="col-sm-10 offset-sm-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="gridCheck1" required>
                  <label class="form-check-label" for="gridCheck1">
                    Agree to terms and conditions
                  </label>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                  <div class="d-grid gap-2 col-6 mx-auto">
                      <button type="submit" class="btn btn-primary btn-block" style="border-radius:20px;">Sign up</button>
                  </div>
              </div>
            </div>
            <!-- Add a gap -->
            <div class="row">
                <div class="col-12 mt-3">
                    <!-- The 'mt-3' class adds margin-top for the gap -->
                    <div class="d-grid gap-2 col-6 mx-auto">
                        <!-- Change button color to black -->
                        <button class="btn btn-dark btn-block" type="button" style="border-radius:20px;" onclick="toggleModals()">Log in</button>
                    </div>
                </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  {% block content %}

  {% endblock %}


  <!-- footer section-->

  <footer class="position-fixed bottom-0 w-100 h-40 z-index-10 d-print-none" style="background-color: #0360D9;">
    <!-- Copyright section of the footer-->
    <div class="py-4 font-weight-light bg-gray-800 text-gray-300">
      <div class=" container">
        <div class="row align-items-center">
        </div>
  </footer>


  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
    crossorigin="anonymous"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js" integrity="sha384-SR1sx49pcuLnqZUnnPwx6FCym0wLsk5JZuNx2bPPENzswTNFaQU1RDvt3wT4gWFG" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.min.js" integrity="sha384-j0CNLUeiqtyaRmlzUHCPZ+Gy5fQu0dQ6eZ/xAww941Ai1SxSY+0EQqNXNE6DZiVc" crossorigin="anonymous"></script>
    -->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/base.js') }}"></script>
    
       


</body>

</html>
