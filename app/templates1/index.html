{% extends 'base.html' %}

{% block head %}
<title>AI Psychologist | Your Virtual Psychologist</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
<style>
    .example-divider {
        height: 3rem;
        background-color: rgba(0, 0, 0, .1);
        border: solid rgba(0, 0, 0, .15);
        border-top-width: medium;
        border-right-width: medium;
        border-bottom-width: medium;
        border-left-width: medium;
        border-width: 1px 0;
        box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
    }
</style>

{% endblock %}

{% block content %}

<!-- <div class="example-divider"></div> -->

<div class="container col-xxl-8 px-4 py-5">
    <div class="row flex-lg-row-reverse g-5 py-5 justify-content-between">
        <div class="col-10 col-sm-8 col-lg-6">
            <img src="{{ url_for('static', filename='img/card3.png') }}" class="d-block mx-lg-auto img-fluid" alt=""
                loading="lazy" width="700" height="500">
        </div>
        <div class="col-lg-6">
            <h1 class="display-5 fw-bold lh-1 mb-3"> Welcome to </h1>
            <h1 class="display-5 fw-bold lh-1 mb-3" style="color:#0360D9;"> AI PSYCHOLOGIST </h1> 
            <h1 class="display-5 fw-bold lh-1 mb-3"> Anxiety Detection System </h1>
            <p class="lead">Where Technology Meets Well-Being </p>
            <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                <a href="{{ url_for('main.services') }}"><button type="button"
                        class="btn btn-lg px-4 me-md-2" style="border-radius:20px; background-color: #0360D9; color: #FFFFFF;">Get Started</button></a>
                <!-- <button type="button" class="btn btn-outline-secondary btn-lg px-4">Default</button> -->
            </div>
        </div>
    </div>
</div>

{% endblock %}
