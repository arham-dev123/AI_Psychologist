{% extends 'base_dashboard.html' %}

{% block head %}

    <title> AI Psychologist </title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/details.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
{% endblock %}

{% block content %}
    <div class="container my-4 py-4">
        <div class="row">
            <div class="col-md-8 offset-md-3 col-sm-12">
                <div class="box box-success direct-chat direct-chat-success text-center">
                    <div class="box-header with-border">
                        <h1 class="box-title">Enter Details</h1>
                        <p class="text-center mt-3">Please Enter User Details to proceed further </p>
                    </div>
                    <form action="{{ url_for('form.details', total_score=total_score, form_type=form_type) }}" method="POST">
                        <input type="hidden" name="formType" value="{{ formType }}">
                        <div style="justify-content: center;">
                            <div class="box-body d-flex">
                                <input type="text" name="first_name" placeholder="Enter First Name"  style="font-size: medium; background-color: none; width: 100%; border-radius: 30px; border: 2px solid #262626; padding: 15px 15px 15px 15px;">
                            </div>
                            <div class="box-body d-flex">
                                <input type="text" name="last_name" placeholder="Enter Last Name"  style="font-size: medium; background-color: none; width: 100%; border-radius: 30px; border: 2px solid #262626; padding: 15px 15px 15px 15px;">
                            </div>
                            <div class="box-body d-flex">
                                <input type="text" name="age" placeholder="Enter Age"  style="font-size: medium; background-color: none; width: 100%; border-radius: 30px; border: 2px solid #262626; padding: 15px 15px 15px 15px;">
                            </div>
                        </div>
                        <div class="box-footer">
                            <button type="submit" class="btn btn-lg px-4 me-md-2" style="background-color: #0360D9; color: #FFFFFF;">Generate Report</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
