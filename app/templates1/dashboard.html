{% extends 'base_dashboard.html' %}
{% block head %}
<title> Dashboard | AI Psychologist </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
{% endblock %}
{% block content %}
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3">
    <h1 class="h2">Dashboard</h1>
  </div>

  <!-- Top Grid -->
  <div class="row justify-content-center">
    <div class="card mx-1 my-1 col-12 col-lg-8 rounded-4" style="width: 98%; box-shadow: 0 3px 5px rgba(0,0,0,0.2); background-color: #0360D9; color: #FFFFFF;">
      <div class="row">
        <div class="col-md-6">
          <div class="card-body">
            <h1 class="card-title py-4">AI Psychologist for Anxiety disorders</h1>
            <div class="py-4 px-2">
              <a href="{{ url_for('chat.chat') }}" class="btn btn-outline btn-lg" style="border-radius:10px; background-color:#FFFFFF; color:#2975d8; box-shadow: 0 3px 5px rgba(0,0,0,0.2); padding: 1rem 1rem 1rem 1rem; font-size: 2rem; font: bolder;">Start Assessment</a>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <img src="{{ url_for('static', filename='img/unsplash_7bMdiIqz_J4.png') }}" class="img-fluid" alt="AI Image">
        </div>
      </div>
    </div>
  </div>
  

  <!-- Bottom Grids -->
  <div class="row justify-content-center justify-content-between">
    <!-- Grid 1 -->
      <div class="card mx-2 my-2 col-12 col-lg-4 rounded-4" style="width: 48%; padding-bottom: 4%; box-shadow: 0 3px 5px rgba(0,0,0,0.2);" id="card1">
        <!-- Card 1 HTML -->
      </div>
    <!-- Grid 2 -->
    <div class="card mx-2 my-2 col-12 col-lg-4 rounded-4" style="width: 48%; padding-bottom: 4%; box-shadow: 0 3px 5px rgba(0,0,0,0.2);" id="card2">
      <!-- Card 2 HTML -->
    </div>
  </div>
</main>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>



{% endblock %}
